# 后端与 Agent 配置
CAMPUSPILOT_HOST=0.0.0.0
CAMPUSPILOT_PORT=8787
CAMPUSPILOT_STATIC_ROOT=../campuspilot-home
CAMPUSPILOT_PUBLIC_BASE_URL=https://campuspilot.example.com
CAMPUSPILOT_AGENT_NAME=CampusPilot 启航智伴学业成长助手
CAMPUSPILOT_AGENT_ASSISTANT_ID=
CAMPUSPILOT_AGENT_CALLBACK_TOKEN=
CAMPUSPILOT_AGENT_RESPONSE_WAIT_MS=30000
CAMPUSPILOT_WORKER_THREADS=12
CAMPUSPILOT_WORKFLOW_API_URL=
CAMPUSPILOT_WORKFLOW_API_KEY=
CAMPUSPILOT_WORKFLOW_TIMEOUT_MS=12000

# CORS 与可选预设 Bearer Token。多个来源用英文逗号分隔。
CAMPUSPILOT_CORS_ALLOWED_ORIGINS=http://127.0.0.1:8881
CAMPUSPILOT_API_BEARER_TOKEN=

# 金蝶 AI 苍穹 KAPI（仅在后端配置，禁止写入 KWC 前端源码）
# BASE_URL 填平台根地址，不带 /ierp；代码同时兼容旧值 http://host:port/ierp。
KINGDEE_BASE_URL=http://127.0.0.1:8881
KINGDEE_CLIENT_ID=
KINGDEE_CLIENT_SECRET=
KINGDEE_USERNAME=
KINGDEE_ACCOUNT_ID=
KINGDEE_LANGUAGE=zh_CN
KINGDEE_TIMEOUT=8000

# 可选：兼容已有部署的固定令牌。生产环境建议留空并使用上面的增强型 Token 凭据。
KINGDEE_ACCESS_TOKEN=

# 旧 CAMPUSPILOT_KINGDEE_* 变量仍可用，但仅用于平滑迁移。
