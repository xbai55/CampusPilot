<template>
    <div class="donut-wrap">
        <div class="donut-chart" style={donutStyle}></div>
        <div class="donut-center">
            <strong>{total}</strong>
            <span>学生总数</span>
        </div>
    </div>
    <div class="risk-bars">
        <template for:each={chartItems} for:item="item">
            <div key={item.key} class="risk-row" style={item.barStyle}>
                <div class="risk-meta">
                    <span class="risk-name"><i class="risk-dot"></i>{item.name}</span>
                    <strong>{item.countText}</strong>
                </div>
                <div class="bar-track"><div class="bar-fill"></div></div>
            </div>
        </template>
    </div>
</template>
