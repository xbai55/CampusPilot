<template>
    <div class="meta">
        <p class="eyebrow">{eyebrow}</p>
        <h1>{title}</h1>
        <p if:true={subtitle} class="subtitle">{subtitle}</p>
    </div>
    <div class="actions">
        <label class="search">
            <svg viewBox="0 0 24 24"><path d="M10.8 4a6.8 6.8 0 1 1 0 13.6 6.8 6.8 0 0 1 0-13.6Zm0 2a4.8 4.8 0 1 0 0 9.6 4.8 4.8 0 0 0 0-9.6Zm5.4 9 3.8 3.8-1.4 1.4-3.8-3.8 1.4-1.4Z"></path></svg>
            <input type="search" placeholder="搜索学生 / 课程 / 预警单" oninput={handleSearchInput} autocomplete="off">
        </label>
        <button class="icon-btn" type="button" aria-label="刷新" onclick={handleRefresh}>
            <svg viewBox="0 0 24 24"><path d="M18.5 7.3A8 8 0 1 0 20 12h-2a6 6 0 1 1-1.1-3.5L14 11.4h7V4.3l-2.5 3Z"></path></svg>
        </button>
        <template if:false={isAuth}>
            <div class="auth-link" data-route="/login" onclick={handleNavigate}>登录</div>
            <div class="auth-link primary" data-route="/login" onclick={handleNavigate}>注册</div>
        </template>
        <template if:true={isAuth}>
            <div class="user-btn" data-route="/user" onclick={handleNavigate}>
                <span class="avatar">{userInitial}</span>
                <span><strong>{userName}</strong><small>{userRole}</small></span>
            </div>
            <div class="auth-link" onclick={handleLogout}>退出</div>
        </template>
    </div>
</template>
