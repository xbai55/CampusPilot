<template>
    <main class={shellClass}>
        <header class="topbar">
            <div>
                <p class="eyebrow">KWC Custom Control</p>
                <h1>{pageTitle}</h1>
                <p class="subtitle">面向 A6 智慧校园赛题的学业风险识别、预警流转与 Agent 辅导工作台。</p>
            </div>
            <div class="top-actions">
                <div class="segmented" aria-label="角色切换">
                    <template for:each={roleOptions} for:item="roleItem">
                        <button key={roleItem.id} class={roleItem.className} data-role={roleItem.id} onclick={handleRoleChange}>
                            {roleItem.label}
                        </button>
                    </template>
                </div>
                <button class="icon-button" title="刷新数据" onclick={handleRefresh}>↻</button>
            </div>
        </header>

        <section class="notice" aria-live="polite">{notice}</section>

        <nav class="tabs" aria-label="CampusPilot 模块">
            <template for:each={navItems} for:item="item">
                <button key={item.id} class={item.className} data-page={item.id} onclick={handleNavigate}>
                    {item.label}
                </button>
            </template>
        </nav>

        <section if:true={isDashboard} class="workspace">
            <div class="metric-grid">
                <template for:each={metrics} for:item="metric">
                    <article key={metric.id} class="metric-card">
                        <p>{metric.label}</p>
                        <strong>{metric.value}</strong>
                        <span>{metric.note}</span>
                    </article>
                </template>
            </div>
            <div class="two-column">
                <section class="panel">
                    <div class="panel-head">
                        <h2>业务闭环</h2>
                        <button class="ghost-button" onclick={handleCreateSuggestion}>生成预警</button>
                    </div>
                    <div class="workflow">
                        <template for:each={workflowSteps} for:item="step">
                            <div key={step.id} class={step.className}>
                                <span>{step.stepNo}</span>
                                <p>{step.name}</p>
                            </div>
                        </template>
                    </div>
                </section>
                <section class="panel">
                    <h2>课程与行为概览</h2>
                    <div class="mini-list">
                        <template for:each={courses} for:item="course">
                            <div key={course.name} class="mini-row">
                                <span>{course.name}</span>
                                <strong>{course.passRate}</strong>
                                <em>{course.weakPoint}</em>
                            </div>
                        </template>
                    </div>
                    <div class="behavior-strip">
                        <template for:each={behaviors} for:item="behavior">
                            <div key={behavior.name}>
                                <span>{behavior.name}</span>
                                <strong>{behavior.value}</strong>
                                <p>{behavior.state}</p>
                            </div>
                        </template>
                    </div>
                </section>
            </div>
        </section>

        <section if:true={isStudents} class="workspace">
            <div class="student-grid">
                <template for:each={students} for:item="student">
                    <article key={student.id} class="student-card">
                        <div class="student-head">
                            <div>
                                <h2>{student.name}</h2>
                                <p>{student.major} · {student.grade}</p>
                            </div>
                            <span class={student.riskClass}>{student.riskLevel}</span>
                        </div>
                        <div class="score-line">
                            <strong>{student.score}</strong>
                            <span>风险分</span>
                        </div>
                        <dl class="profile-data">
                            <div><dt>GPA</dt><dd>{student.gpa}</dd></div>
                            <div><dt>出勤</dt><dd>{student.attendance}</dd></div>
                            <div><dt>作业</dt><dd>{student.homework}</dd></div>
                            <div><dt>活跃</dt><dd>{student.active}</dd></div>
                        </dl>
                        <p class="reason">{student.reason}</p>
                        <p class="target">{student.target}</p>
                    </article>
                </template>
            </div>
        </section>

        <section if:true={isWarnings} class="workspace">
            <section class="panel">
                <div class="panel-head">
                    <h2>预警单流转</h2>
                    <button class="primary-button" onclick={handleCreateSuggestion}>从画像生成预警单</button>
                </div>
                <template for:each={warnings} for:item="warning">
                    <article key={warning.id} class="warning-row">
                        <div>
                            <span class="record-id">{warning.id}</span>
                            <h3>{warning.student} · {warning.level}</h3>
                            <p>{warning.action}</p>
                        </div>
                        <div class="warning-state">
                            <span>{warning.stage}</span>
                            <small>{warning.owner}</small>
                        </div>
                        <button class="ghost-button" data-id={warning.id} onclick={handleAdvanceWarning}>
                            推进
                        </button>
                    </article>
                </template>
            </section>
        </section>

        <section if:true={isAgent} class="workspace">
            <section class="panel agent-layout">
                <div>
                    <h2>金蝶 Agent 分析入口</h2>
                    <p class="helper">前端只传业务问题和角色上下文；平台地址、应用密钥和 Token 获取应由后端或金蝶平台配置承接。</p>
                    <textarea value={agentQuestion} oninput={handleQuestionInput}></textarea>
                    <button class="primary-button" onclick={handleAskAgent}>询问 Agent</button>
                </div>
                <pre class="agent-answer">{agentAnswer}</pre>
            </section>
        </section>

        <section if:true={isIntegration} class="workspace">
            <section class="panel">
                <h2>金蝶平台接入清单</h2>
                <div class="integration-grid">
                    <template for:each={integrationChecklist} for:item="item">
                        <article key={item.id} class="integration-card">
                            <span>{item.state}</span>
                            <h3>{item.label}</h3>
                            <p>{item.detail}</p>
                        </article>
                    </template>
                </div>
            </section>
        </section>
    </main>
</template>
